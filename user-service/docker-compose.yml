version: '3.8'

services:
  auth-service:
    build:
      context: ..
      dockerfile: ./auth-service/Dockerfile
    ports:
      - "8081:8081"
      - "9090:9090"
    env_file:
      - ../auth-service/.env
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - innotaxi-network

  user-service:
    build:
      context: ..
      dockerfile: ./user-service/Dockerfile
    ports:
      - "8080:8080"
      - "9091:9091"
    env_file:
      - ./.env
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - innotaxi-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - innotaxi-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - innotaxi-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    networks:
      - innotaxi-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: "cub zk-ready zookeeper:2181 30"
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    networks:
      - innotaxi-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: "cub kafka-ready -b kafka:9092 1 30"
      interval: 15s
      timeout: 10s
      retries: 10

networks:
  innotaxi-network:
    driver: bridge