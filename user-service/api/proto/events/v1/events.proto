syntax = "proto3";

package events.v1;

option go_package = "github.com/bns/api/proto/events/v1;eventsv1";

import "google/protobuf/timestamp.proto";

message UserRegisteredEvent {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
  google.protobuf.Timestamp registered_at = 5;
}

message UserRatingUpdatedEvent {
  string user_id = 1;
  double new_rating = 2;
}
