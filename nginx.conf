events {
    worker_connections 1024;
}

http {
    upstream auth_service     { server auth_service:8080; }
    upstream user_service     { server user_service:8080; }
    upstream beat_service     { server beat_service:8080; }
    upstream interaction_service { server interaction_service:8080; }
    upstream order_service    { server order_service:8080; }
    upstream wallet_service   { server wallet_service:8080; }
    upstream analytics_service { server analytics_service:8080; }

    server {
        listen 80;

        # Auth
        location /api/auth {
            proxy_pass http://auth_service/api/v1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Users
        location /api/users {
            proxy_pass http://user_service/api/v1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Beats
        location /api/beats {
            proxy_pass http://beat_service/api/v1/beats;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            client_max_body_size 50M;
        }

        # Interactions (comments, ratings)
        location /api/interactions {
            proxy_pass http://interaction_service/api/v1/interactions;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Orders (purchase)
        location /api/orders {
            proxy_pass http://order_service/api/v1/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Wallet
        location /api/wallet {
            proxy_pass http://wallet_service/api/v1/wallet;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Analytics
        location /api/analytics {
            proxy_pass http://analytics_service/api/v1/analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
