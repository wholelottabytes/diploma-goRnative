# Microservices for Music Beat Marketplace
services:
  # ─── Monitoring Setup (ILM Policy) ────────────────────────────────
  setup_monitoring:
    image: curlimages/curl:latest
    container_name: setup_monitoring
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./setup-elastic.sh:/scripts/setup-elastic.sh:ro
    entrypoint: ["/bin/sh", "/scripts/setup-elastic.sh"]
    networks:
      - backend

  filebeat:
    build:
      context: ./filebeat
    container_name: filebeat
    user: root # Needed to read Docker container logs
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  # ─── Databases ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wallet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6.0
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

